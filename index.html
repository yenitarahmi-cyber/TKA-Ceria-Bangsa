<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKA Ceria Bangsa</title>
    <style>
        /* CSS untuk Styling */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f9ff;
            font-family: Verdana, Geneva, sans-serif; /* Menggunakan Verdana */
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            display: flex;
            gap: 10px;
        }

        /* Warna-warni ceria untuk setiap kata */
        .word-tka { color: #ff5733; }   /* Oranye */
        .word-ceria { color: #33ff57; } /* Hijau */
        .word-bangsa { color: #3357ff; } /* Biru */

        /* Animasi goyang saat di-hover */
        .letter {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .letter:hover {
            transform: scale(1.2) rotate(10deg);
            color: #ff33a1; /* Berubah warna saat disentuh */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">
            <!-- Teks akan dipecah menjadi huruf oleh JavaScript -->
        </h1>
        <p style="color: #666;">Ayo belajar dengan gembira!</p>
    </div>

    <script>
        // JavaScript untuk memecah teks menjadi elemen interaktif
        const text = "TKA CERIA BANGSA";
        const titleElement = document.getElementById('title');

        text.split("").forEach((char, index) => {
            const span = document.createElement('span');
            span.textContent = char === " " ? "\u00A0" : char; // Tangani spasi
            span.className = 'letter';
            
            // Memberikan warna grup kata secara manual lewat JS atau CSS
            if (index < 3) span.classList.add('word-tka');
            else if (index > 3 && index < 9) span.classList.add('word-ceria');
            else if (index >= 9) span.classList.add('word-bangsa');

            titleElement.appendChild(span);
        });

        // Efek klik: Huruf melompat
        titleElement.addEventListener('click', () => {
            alert("Halo dari TKA Ceria Bangsa! 👋");
        });
    </script>
</body>
</html>
